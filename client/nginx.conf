server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # PWA manifest — зөв MIME type
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Service worker — кэшлэхгүй (шинэ хувилбар тэр даруй идэвхжинэ)
    location = /sw.js {
        add_header Cache-Control "no-cache";
        default_type application/javascript;
    }

    # SPA — бүх route-ыг index.html руу буцаана (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API-г backend (server container) руу дамжуулна
    location /api/ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload хийсэн зургууд — server-ийн статик файлууд руу дамжуулна
    location /uploads/ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO — websocket upgrade-тэйгээр дамжуулна
    location /socket.io/ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
